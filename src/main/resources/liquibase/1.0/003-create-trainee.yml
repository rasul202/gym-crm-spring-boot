databaseChangeLog:
  - changeSet:
      id: 003-create-trainee
      author: copilot
      changes:
        - createTable:
            tableName: trainee
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: pk_trainee
              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: trainee
            columnNames: user_id
            constraintName: uk_trainee_user_id
        - addForeignKeyConstraint:
            baseTableName: trainee
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_trainee_user
            onDelete: RESTRICT
            onUpdate: CASCADE

