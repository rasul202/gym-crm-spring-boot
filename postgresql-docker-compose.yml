version: '3.8'
services:
  db-local:
    image: postgres:15
    container_name: gymcrm-db-local
    environment:
      POSTGRES_DB: gymcrm_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localSecretPwd123
    ports:
      - "5443:5432"

  db-dev:
    image: postgres:15
    container_name: gymcrm-db-dev
    environment:
      POSTGRES_DB: gymcrm_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devSecretPwd234
    ports:
      - "5444:5432"

  db-stg:
    image: postgres:15
    container_name: gymcrm-db-stg
    environment:
      POSTGRES_DB: gymcrm_stg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stgSecretPwd345
    ports:
      - "5445:5432"

  db-prod:
    image: postgres:15
    container_name: gymcrm-db-prod
    environment:
      POSTGRES_DB: gymcrm_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prodSecretPwd456
    ports:
      - "5446:5432"
